# Mac: clang 18. Linux: gcc 14 (match ASP build).
python:
  - "3.13"
c_compiler_version:
  - "18"   # [osx]
  - "14"   # [linux]
cxx_compiler_version:
  - "18"   # [osx]
  - "14"   # [linux]
c_stdlib:
  - sysroot                    # [linux]
  - macosx_deployment_target   # [osx]
c_stdlib_version:
  - "2.17"   # [linux]
  - "11.0"   # [osx-arm64]
  - "10.13"  # [osx-64]
