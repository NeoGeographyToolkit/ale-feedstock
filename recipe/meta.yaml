{% set name = "ale" %}
{% set version = "1.2.0" %}
package:
  name: {{ name|lower }}
  version: {{ version }}

# ASP build: source is DOI-USGS/ale main @ 94cdef7 (8 commits past the 1.2.0
# tag), which INCLUDES our merged HRSC fix #716; the released 1.2.0 tarball
# does NOT. setup.py hardcodes VERSION="1.2.0" so the version stays clean 1.2.0.
source:
  git_url: https://github.com/DOI-USGS/ale.git
  git_rev: 94cdef7f792e9908d19d649d9c3006b820f2b3e3

build:
  number: 5
  string: asp_5          # rebuild with =asp* pins, gcc 14
  entry_points:
    - isd_generate = ale.isd_generate:main
  skip: true  # [win]

requirements:
  build:
    - python
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('cxx') }}
    # ASP: removed `{{ stdlib("c") }}` - it expanded to the bogus, unsatisfiable
    # package c_osx-arm64 (c_stdlib variant is undefined in our local
    # conda-build; conda-forge CI supplies it via conda-forge-pinning, we
    # don't). The cxx compiler activation already brings the macOS sysroot.
    - cmake >=3.15
    - make
    # ASP: pip+setuptools MUST be here in BUILD (not just host). build.sh runs
    # `pip install . --no-build-isolation` with the BUILD-env python/pip, so the
    # backend (setuptools.build_meta) must live in BUILD or pip dies with
    # "BackendUnavailable: Cannot import 'setuptools.build_meta'". Pinned down
    # because bleeding-edge pip 26 / setuptools 82 break the legacy setup.py.
    - pip <26
    - setuptools <80
  host:
    - eigen >=3,<4
    - nlohmann_json =3.11.2
    - python
    # ASP: pin pip/setuptools DOWN. Unpinned, conda pulled pip 26.1.2 +
    # setuptools 82.0.1 (bleeding edge); pip 26.x crashes internally
    # resolving the local `pip install .` of ALE's legacy setup.py. The
    # known-good combo (base env, verified building the wheel by hand) is
    # pip 24.x / setuptools 75. Build-time only - does NOT affect isis_dev's
    # runtime pip/setuptools.
    - pip <26
    - setuptools <80
  run:
    - networkx
    - {{ pin_compatible('nlohmann_json', min_pin='x.x.x', max_pin='x.x.x') }}
    - numpy
    - pvl >=1.0
    - python
    - python-dateutil
    - pytz
    - scipy >=1.4.0
    - spiceypy >=2.3.0
    - spiceql =1.3.0=asp*
    - requests
    - pyyaml
    - setuptools
    - brotli-python

test:
  requires:
    - setuptools
  imports:
    - ale
  commands:
    - test -e $PREFIX/lib/libale${SHLIB_EXT}  # [unix]
    - if not exist %LIBRARY_BIN%\ale.dll exit 1  # [win]
    - if not exist %LIBRARY_LIB%\ale.lib exit 1  # [win]
    - isd_generate --version

about:
  home: https://github.com/DOI-USGS/ale
  license: CC0-1.0
  license_file: LICENSE.md
  summary: Abstraction Library for Ephemerides (ALE) for extracting and processing planetary sensor ephemeris data.

extra:
  recipe-maintainers:
    - amystamile-usgs
    - jlaura
    - jessemapel
    - andrewannex
    - acpaquette
    - chkim-usgs
    - kelvinrr
