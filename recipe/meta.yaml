{% set name = "ale" %}
{% set version = "1.2.0" %}
package:
  name: {{ name|lower }}
  version: {{ version }}

# ASP CaSSIS build: source is oleg-alexandrov/ale branch lagrange_rotation_python
# @ b458960 (past the 1.2.0 tag). Adds the TGO CaSSIS driver (#720), the
# isd_generate metakernel fix (#725), and Lagrange quaternion interpolation
# (#726/#727), plus the CASSIS C++ DistortionType enum that usgscsm references.
# setup.py hardcodes VERSION="1.2.0" so the version stays clean 1.2.0; the =cassis
# build string marks this as the CaSSIS-capable build.
source:
  git_url: https://github.com/oleg-alexandrov/ale.git
  git_rev: b45896057ce5dd6b02877194a871163092d28a86

build:
  number: 0
  string: cassis_0_{{ target_platform | replace("-", "_") }}
  entry_points:
    - isd_generate = ale.isd_generate:main
  skip: true  # [win]

requirements:
  build:
    - python
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.15
    - make
    # ASP: pip+setuptools MUST be here in BUILD (not just host). build.sh runs
    # `pip install . --no-build-isolation` with the BUILD-env python/pip, so the
    # backend (setuptools.build_meta) must live in BUILD or pip dies with
    # "BackendUnavailable: Cannot import 'setuptools.build_meta'". Pinned down
    # because bleeding-edge pip 26 / setuptools 82 break the legacy setup.py.
    - pip <26
    - setuptools <80
  host:
    - eigen >=3,<4
    - nlohmann_json =3.11.2
    - python
    # ASP: pin pip/setuptools DOWN. Unpinned, conda pulled pip 26.1.2 +
    # setuptools 82.0.1 (bleeding edge); pip 26.x crashes internally
    # resolving the local `pip install .` of ALE's legacy setup.py. The
    # known-good combo (base env, verified building the wheel by hand) is
    # pip 24.x / setuptools 75. Build-time only - does NOT affect isis_dev's
    # runtime pip/setuptools.
    - pip <26
    - setuptools <80
  run:
    - networkx
    # CaSSIS ale imports osgeo.gdal (kernel_access.py, drivers/__init__.py,
    # base.py). No explicit version pin: ASP already pins gdal 3.12.2 (ISIS
    # floor) and that drives it in a consistent solve.
    - gdal
    - {{ pin_compatible('nlohmann_json', min_pin='x.x.x', max_pin='x.x.x') }}
    - numpy
    - pvl >=1.0
    - python
    - python-dateutil
    - pytz
    - scipy >=1.4.0
    - spiceypy >=2.3.0
    - spiceql =1.3.0=asp*
    - requests
    - pyyaml
    - setuptools
    - brotli-python

test:
  requires:
    - setuptools
  imports:
    - ale
  commands:
    - test -e $PREFIX/lib/libale${SHLIB_EXT}  # [unix]
    - if not exist %LIBRARY_BIN%\ale.dll exit 1  # [win]
    - if not exist %LIBRARY_LIB%\ale.lib exit 1  # [win]
    - isd_generate --version

about:
  home: https://github.com/DOI-USGS/ale
  license: CC0-1.0
  license_file: LICENSE.md
  summary: Abstraction Library for Ephemerides (ALE) for extracting and processing planetary sensor ephemeris data.

extra:
  recipe-maintainers:
    - amystamile-usgs
    - jlaura
    - jessemapel
    - andrewannex
    - acpaquette
    - chkim-usgs
    - kelvinrr
